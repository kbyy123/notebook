site_name: 空白阴影的笔记本
site_author: 空白阴影
site_url: ''

repo_url: https://github.com/kbyy123/notebook.git
repo_name: kbyy123/notebook
use_directory_urls: false    # 加上这句后才能显示用 html img 相对路径插入的图片

theme:
  name: material
  language: zh  # 设置为中文
  custom_dir: overrides
  features:
    - content.action.edit
    - content.action.view      # 在页面右上角添加“编辑此页”或“查看源码”的按钮
    - content.code.copy        # 代码块一键复制
    - content.code.annotate    # 注释气泡 
    - content.footnote.tooltips
    - navigation.footer        # 在页面底部显示“上一篇/下一篇”导航
    - navigation.indexes       # 允许点击分类大类名直接进入该目录的 index.md
    - navigation.path          # 在页面顶部显示当前页面的路径
    - navigation.prune         # 性能优化
    - navigation.tabs           
    - navigation.top
    - navigation.tracking
    - search.share
    - toc.follow               # 右侧目录随滚动高亮
    - content.code.copy        # 代码块一键复制
  font:
    text: false
    code: JetBrains Mono
  icon:
    admonition: 
      example: material/bulletin-board
      proof: fontawesome/solid/pen-nib
      code: fontawesome/solid/code

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:       # LaTeX 数学公式支持
      generic: true
      smart_dollar: true  # 关键：防止 Markdown 引擎干扰美元符号内的内容
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - md_in_html  # 核心：允许在 <div> 标签内解析 Markdown    
  - pymdownx.superfences       # 支持更复杂的代码块嵌套
  - pymdownx.details           # 支持折叠块 (Admonitions)
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - css/custom.css?v=20260322
  - css/timestamp.css
  - css/home.css
  - css/font.css?v=20260322
  - css/copyright.css
  - css/icon.css?v=20260322
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js
  - js/katex.js
  - js/heading-number-normalize.js
  - https://cdn.jsdelivr.net/npm/pseudocode@latest/build/pseudocode.min.js
  # - https://polyfill.io/v3/polyfill.min.js?features=es6
  # - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - js/typed.js

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true  # 开启创建时间
      type: datetime              # 显示完整日期时间
      locale: zh                  # 使用中文界面
      timezone: Asia/Shanghai     # 设置时区
  - changelog
  - statistics
  - add-number:
      strict_mode: False
      order: 2
      excludes:
        - index.md
        - math/index.md
        - data-structure/index.md
        - computer-system/index.md
  # - enumerate-headings:
  #     increment_across_pages: false
  #     toc_depth: 6
  #     strict: false
  #     exclude:
  #       - index.md
  #       - math/index.md
  #       - data-structure/index.md
  #       - computer-system/index.md

nav:
  - 🏫主页: index.md
  - 📊数学: 
    - math/index.md
    - 多变量微积分:
      - math/multivariable-calculus/index.md
      - math/multivariable-calculus/1.md
      - math/multivariable-calculus/2.md
      - math/multivariable-calculus/3.md
      - math/multivariable-calculus/4.md
    - 线性代数:
      - math/linear-algebra/index.md
      - math/linear-algebra/introduction.md
      - math/linear-algebra/linear-equation.md
      - math/linear-algebra/vector-space.md
      - math/linear-algebra/orthogonality.md
      - math/linear-algebra/determinant.md
    - 离散数学:
      - math/discrete-math/index.md
      - math/discrete-math/Chap1.md
      - math/discrete-math/set.md
      - math/discrete-math/proof.md
      - math/discrete-math/induction.md
    - 概率论:
      - math/probability/index.md
      - math/probability/counting.md
      - math/probability/core-probability.md
      - math/probability/random-variables.md
  - 💡数据结构与算法:
    - data-structure/index.md
    - LeetCode:
      - data-structure/LeetCode/index.md
      - data-structure/LeetCode/linked-list.md
      - data-structure/LeetCode/binary-tree.md
    - 基础数据结构:
      - data-structure/fds/index.md
      - data-structure/fds/string.md
      - data-structure/fds/tree.md
  - 💻计算机系统:
    - computer-system/index.md
    - 体系结构:
      - computer-system/computer-architecture/index.md
      - computer-system/computer-architecture/C.md
      - computer-system/computer-architecture/number.md
  # - 📝编程语言:
  #   - C++:
  #     - language/cpp/compile.md
  #     - language/cpp/temp.md
  